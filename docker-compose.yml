services:
  db:
    image: postgres:15-alpine
    container_name: acheaq-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password_acheaq}
      POSTGRES_DB: ${POSTGRES_DB:-acheaq}
    ports:
      # Apenas expõe na interface de loopback local para segurança no ambiente local
      - "${DB_PORT_BINDING:-127.0.0.1:5432:5432}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acheaq-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password_acheaq}@db:5432/${POSTGRES_DB:-acheaq}?schema=public
      JWT_SECRET: ${JWT_SECRET:-jwt_default_secret_please_change_in_production}
      PORT: ${BACKEND_PORT:-5000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${BACKEND_PORT_BINDING:-127.0.0.1:5000:5000}"
    volumes:
      # Uploads persistentes de fotos dos objetos
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acheaq-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT_BINDING:-3000:80}"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:9.16
    container_name: acheaq-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@acheaq.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_pgadmin_password_acheaq}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT_BINDING:-5050:80}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads_data:

