server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Cabeçalhos de segurança adicionais
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # CSP restrita liberando fontes do Google e imagens enviadas pelo backend local
    add_header Content-Security-Policy "default-src 'self' http://localhost:5000 http://127.0.0.1:5000; img-src 'self' data: http://localhost:5000 http://127.0.0.1:5000; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none';" always;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
