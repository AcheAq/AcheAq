server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Encaminha chamadas de API internamente para o contêiner do backend
    location /api/ {
        proxy_pass http://backend:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Redireciona /api para /api/ para evitar erros de rota
    location = /api {
        return 301 $scheme://$http_host/api/;
    }

    # Cabeçalhos de segurança adicionais
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # CSP restrita liberando fontes do Google e imagens enviadas pelo backend local
    add_header Content-Security-Policy "default-src 'self' http://localhost:5000 http://127.0.0.1:5000; img-src 'self' data: http://localhost:5000 http://127.0.0.1:5000; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none';" always;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
